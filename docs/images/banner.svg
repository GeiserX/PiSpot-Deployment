<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C51A4A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="white" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <!-- Raspberry Pi board outline icon -->
  <g transform="translate(100, 50)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Board -->
    <rect x="0" y="10" width="70" height="80" rx="4"/>
    <!-- GPIO pins top -->
    <line x1="10" y1="10" x2="10" y2="2"/>
    <line x1="18" y1="10" x2="18" y2="2"/>
    <line x1="26" y1="10" x2="26" y2="2"/>
    <line x1="34" y1="10" x2="34" y2="2"/>
    <line x1="42" y1="10" x2="42" y2="2"/>
    <line x1="50" y1="10" x2="50" y2="2"/>
    <line x1="58" y1="10" x2="58" y2="2"/>
    <!-- CPU chip -->
    <rect x="20" y="35" width="30" height="25" rx="2"/>
    <!-- USB port -->
    <rect x="60" y="25" width="10" height="18" rx="1" opacity="0.7"/>
    <!-- SD card slot -->
    <rect x="-8" y="45" width="8" height="15" rx="1" opacity="0.7"/>
    <!-- Mounting holes -->
    <circle cx="8" cy="18" r="3" opacity="0.5"/>
    <circle cx="62" cy="82" r="3" opacity="0.5"/>
    <!-- LED indicators -->
    <circle cx="8" cy="82" r="2" fill="white" opacity="0.6"/>
    <circle cx="16" cy="82" r="2" fill="white" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="450" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">PiSpot Deployment</text>
  <!-- Subtitle -->
  <text x="450" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" opacity="0.85" text-anchor="middle">Deployment files for PiSpot hardware suite</text>
</svg>
